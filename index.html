<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>De Bello Gallico</title>
    
    <!-- Hardcoding the repo path ensures the PWA manifest is found on GitHub Pages -->
    <link rel="manifest" href="/gallic-wars-vocab/manifest.json" />
    <meta name="theme-color" content="#722F37" />
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Vite strictly requires a leading slash for the entry point in development and build -->
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Hardcoding the service worker path ensures registration succeeds on subpaths
          navigator.serviceWorker.register('/gallic-wars-vocab/sw.js')
            .then(reg => console.log('Legion SW Registered:', reg.scope))
            .catch(err => console.log('Recruitment failed:', err));
        });
      }
    </script>
  </body>
</html>
